services:
  thunder-subtitle:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - /path/to/media:/media
    environment:
      - ADMIN_PASSWORD=changeme
      - MEDIA_PATHS=/media
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - JWT_SECRET=change-me-in-production