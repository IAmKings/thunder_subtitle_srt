name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: thunder-subtitle-py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check cli.py commands/ src/ tests/ --ignore F401

      - name: Type check (mypy)
        run: mypy cli.py commands/ src/

      - name: Syntax check
        run: |
          python3 -m py_compile cli.py
          python3 -m compileall commands/ -q
          python3 -m compileall src/ -q

      - name: Run tests
        run: python3 -m pytest tests/ -v
